name: Sync upstream

# Keep the fork's main in sync with kittors/CliRelay. Merges directly; on
# conflict the step fails and GitHub emails the failure so it can be resolved
# by hand. When upstream brought new commits, trigger an image rebuild.

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge upstream/main
        id: merge
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/kittors/CliRelay.git
          git fetch upstream main
          before="$(git rev-parse HEAD)"
          git merge --no-edit FETCH_HEAD
          after="$(git rev-parse HEAD)"
          git push origin HEAD:main
          if [ "$before" != "$after" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger image rebuild when upstream changed
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run fork-image.yml --ref main
