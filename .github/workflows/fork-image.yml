name: Fork image (GHCR)

# Self-use image build for the fork. Builds the combined front+back image and
# pushes it to GitHub Container Registry under the fork owner. Uses the built-in
# GITHUB_TOKEN, so no extra secrets are required.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zhaojun1998/clirelay
  FRONTEND_REPO: https://github.com/zhaojun1998/codeProxy.git

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Compute build metadata
        run: |
          set -euo pipefail
          BACKEND_SHORT="$(git rev-parse --short HEAD)"
          FRONTEND_COMMIT="$(git ls-remote "${FRONTEND_REPO}" refs/heads/main | awk '{print $1}')"
          if [ -z "${FRONTEND_COMMIT}" ]; then
            echo "Unable to resolve frontend main ref from ${FRONTEND_REPO}" >&2
            exit 1
          fi
          FRONTEND_SHORT="${FRONTEND_COMMIT:0:7}"
          echo "VERSION=main-${BACKEND_SHORT}" >> "$GITHUB_ENV"
          echo "UI_VERSION=panel-main-${FRONTEND_SHORT}" >> "$GITHUB_ENV"
          echo "FRONTEND_COMMIT=${FRONTEND_COMMIT}" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            UI_VERSION=${{ env.UI_VERSION }}
            FRONTEND_REF=main
            FRONTEND_COMMIT=${{ env.FRONTEND_COMMIT }}
            FRONTEND_REPOSITORY=${{ env.FRONTEND_REPO }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
